---
# Runs post-auth, after SetApp is installed and Timing has been added inside it.
# dockutil is in homebrew_installed_packages (config.yml).

- name: Add Timing to Dock (SetApp must be set up first)
  command: >
    dockutil --add '/Applications/Setapp/Timing.app'
    --after Slack --no-restart
  ignore_errors: true

- name: Add Desktop folder to Dock right section
  command: >
    dockutil --add ~/Desktop
    --display stack --view fan --sort name
    --section others --position 1 --no-restart
  ignore_errors: true

- name: Add Downloads folder to Dock right section
  command: >
    dockutil --add ~/Downloads
    --replacing Downloads
    --display stack --view fan --sort dateadded
    --section others --position 2 --no-restart
  ignore_errors: true

- name: Restart Dock to apply all changes
  command: killall Dock
  ignore_errors: true
