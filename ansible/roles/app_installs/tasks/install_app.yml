---
# roles/app_installs/tasks/install_app.yml

- name: "Check if {{ app.name }} is already installed (standard path)"
  stat:
    path: "/Applications/{{ app.app_name }}"
  register: app_check_standard

# Adobe CC installs to /Applications/Utilities, not /Applications
- name: "Check alternate install path for {{ app.name }}"
  stat:
    path: "/Applications/Utilities/Adobe Creative Cloud/ACC/Creative Cloud.app"
  register: app_check_alternate
  when: "'Adobe' in app.name"

- name: "Check if {{ app.name }} is installed (any path)"
  shell: |
    test -d "/Applications/{{ app.app_name }}" || \
    {% if 'Adobe' in app.name %}
    test -d "/Applications/Utilities/Adobe Creative Cloud/ACC/Creative Cloud.app" ||
    {% endif %}
    false
  register: app_installed_check
  changed_when: false
  failed_when: false

# -----------------------------------------------------------------------
# For apps whose asset filenames change every release (e.g. include version
# numbers or timestamps), set github_release in vars/main.yml with the
# format "owner/repo" and leave url blank. We resolve the URL here via the
# GitHub API using Ansible's native uri module — no shell escaping required.
# -----------------------------------------------------------------------
- name: "[LOG] {{ app.name }} — checking if already installed"
  debug:
    msg: "{{ app.name }}: {{ 'already installed — skipping' if app_installed_check.rc == 0 else 'not installed — will install' }}"

- name: "[LOG] {{ app.name }} — querying GitHub API for latest release"
  uri:
    url: "https://api.github.com/repos/{{ app.github_release }}/releases/latest"
    return_content: true
    headers:
      Accept: application/vnd.github+json
  register: github_release_info
  when:
    - app_installed_check.rc != 0
    - app.github_release is defined

- name: "[LOG] {{ app.name }} — GitHub API assets"
  debug:
    msg:
      - "Tag: {{ github_release_info.json.tag_name }}"
      - "Assets: {{ github_release_info.json.assets | map(attribute='name') | list }}"
      - "Pattern: {{ app.github_asset_pattern }}"
  when:
    - app_installed_check.rc != 0
    - app.github_release is defined
    - github_release_info is defined

- name: "[LOG] {{ app.name }} — resolve download URL from GitHub release assets"
  set_fact:
    app_download_url: >-
      {{ github_release_info.json.assets
         | selectattr('name', 'search', app.github_asset_pattern)
         | map(attribute='browser_download_url')
         | list
         | first }}
  when:
    - app_installed_check.rc != 0
    - app.github_release is defined
    - github_release_info is defined

- name: "[LOG] {{ app.name }} — set static download URL"
  set_fact:
    app_download_url: "{{ app.url }}"
  when:
    - app_installed_check.rc != 0
    - app.github_release is not defined

- name: "[LOG] {{ app.name }} — resolved URL"
  debug:
    msg: "Download URL: {{ app_download_url | default('NONE — will skip') }}"
  when: app_installed_check.rc != 0

- name: "Download {{ app.name }}"
  get_url:
    url: "{{ app_download_url }}"
    dest: "/tmp/{{ app.name | replace(' ', '_') }}.{{ app.type }}"
    mode: '0644'
  when:
    - app_installed_check.rc != 0
    - app_download_url is defined
    - app_download_url != ''
  register: download_result
  ignore_errors: true

- name: "Warn and skip if download failed for {{ app.name }}"
  debug:
    msg: >
      WARNING: Download failed for {{ app.name }} ({{ app_download_url | default('URL not resolved') }}).
      Skipping install — check the URL or github_release setting in vars/main.yml.
  when:
    - app_installed_check.rc != 0
    - download_result is failed or (app_download_url is not defined) or app_download_url == ''

- name: "Install {{ app.name }} (dmg)"
  when:
    - app_installed_check.rc != 0
    - app.type == 'dmg'
    - download_result is succeeded
  block:
    - name: "Mount DMG for {{ app.name }}"
      command: >
        hdiutil attach "/tmp/{{ app.name | replace(' ', '_') }}.dmg"
        -nobrowse -quiet -noverify
      register: mount_output

    - name: "Find .app in mounted DMG for {{ app.name }}"
      shell: >
        find /Volumes -maxdepth 3 -name "{{ app.app_name }}"
        -not -path "*/.*" 2>/dev/null | head -1
      register: found_app
      changed_when: false

    - name: "Find .pkg in mounted DMG for {{ app.name }}"
      shell: >
        find /Volumes -maxdepth 3 -name "*.pkg"
        -not -path "*/.*" 2>/dev/null | head -1
      register: found_pkg
      changed_when: false
      when: found_app.stdout == ""

    - name: "Copy .app from DMG for {{ app.name }}"
      command: cp -R "{{ found_app.stdout }}" /Applications/
      when: found_app.stdout != ""

    - name: "Install .pkg from DMG for {{ app.name }}"
      become: true
      command: installer -pkg "{{ found_pkg.stdout }}" -target /
      when:
        - found_app.stdout == ""
        - found_pkg is defined
        - found_pkg.stdout != ""

    - name: "Warn if nothing installable found in DMG for {{ app.name }}"
      debug:
        msg: >
          WARNING: Could not find {{ app.app_name }} or any .pkg in the
          mounted DMG for {{ app.name }}. Manual install required.
      when:
        - found_app.stdout == ""
        - found_pkg is not defined or found_pkg.stdout == ""

    - name: "Detach DMG for {{ app.name }}"
      shell: |
        echo "{{ mount_output.stdout }}" | grep "^/dev/" | awk '{print $NF}' \
          | grep "^/Volumes/" | head -1 | xargs -I{} hdiutil detach "{}" -quiet || true
      ignore_errors: true

  rescue:
    - name: "Warn that DMG install failed for {{ app.name }}"
      debug:
        msg: >
          WARNING: DMG install failed for {{ app.name }}.
          The downloaded file may not be a valid DMG, or the URL may have changed.
    - name: "Clean up failed DMG for {{ app.name }}"
      file:
        path: "/tmp/{{ app.name | replace(' ', '_') }}.dmg"
        state: absent
      ignore_errors: true

- name: "Install {{ app.name }} (pkg)"
  become: true
  command: installer -pkg "/tmp/{{ app.name | replace(' ', '_') }}.pkg" -target /
  when:
    - app_installed_check.rc != 0
    - app.type == 'pkg'
    - download_result is succeeded

- name: "Install {{ app.name }} (zip)"
  when:
    - app_installed_check.rc != 0
    - app.type == 'zip'
    - download_result is succeeded
  block:
    - name: Unzip
      unarchive:
        src: "/tmp/{{ app.name | replace(' ', '_') }}.zip"
        dest: /Applications/
        remote_src: yes

- name: "Clean up installer for {{ app.name }}"
  file:
    path: "/tmp/{{ app.name | replace(' ', '_') }}.{{ app.type }}"
    state: absent
  when:
    - app_installed_check.rc != 0
    - download_result is succeeded