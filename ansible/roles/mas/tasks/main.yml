---
# roles/mas/tasks/main.yml
# Installs App Store apps via mas CLI.
# mas 4.0+ requires sudo to install apps.

- name: "[LOG] mas — check if already installed"
  command: which mas
  register: mas_which
  ignore_errors: true
  changed_when: false

- name: "[LOG] mas — install status"
  debug:
    msg: "mas {{ 'already installed at ' + mas_which.stdout if mas_which.rc == 0 else 'not installed — will download' }}"

- name: Download and install mas if not present
  when: mas_which.rc != 0
  block:
    - name: "[LOG] mas — querying GitHub API for latest release"
      uri:
        url: https://api.github.com/repos/mas-cli/mas/releases/latest
        return_content: true
        headers:
          Accept: application/vnd.github+json
      register: mas_release

    - name: "[LOG] mas — API response: tag and available assets"
      debug:
        msg:
          - "Tag: {{ mas_release.json.tag_name }}"
          - "Assets: {{ mas_release.json.assets | map(attribute='name') | list }}"

    - name: "[LOG] mas — resolving arm64 pkg URL"
      set_fact:
        mas_pkg_url: >-
          {{ mas_release.json.assets
             | selectattr('name', 'search', 'arm64.*\.pkg')
             | map(attribute='browser_download_url')
             | list
             | first }}

    - name: "[LOG] mas — resolved download URL"
      debug:
        msg: "Downloading from: {{ mas_pkg_url }}"

    - name: Download mas pkg
      get_url:
        url: "{{ mas_pkg_url }}"
        dest: /tmp/mas.pkg
        mode: '0644'

    - name: Install mas
      become: true
      command: installer -pkg /tmp/mas.pkg -target /

    - name: Clean up mas installer
      file:
        path: /tmp/mas.pkg
        state: absent

  rescue:
    - name: "[LOG] mas — INSTALL FAILED"
      debug:
        msg: >
          WARNING: mas install failed. App Store apps will be skipped.
          Check https://github.com/mas-cli/mas/releases/latest

- name: "[LOG] mas — resolve binary path post-install"
  command: which mas
  register: mas_bin
  changed_when: false
  ignore_errors: true

- name: "[LOG] mas — binary check result"
  debug:
    msg: "mas binary: {{ mas_bin.stdout if mas_bin.rc == 0 else 'NOT FOUND — App Store installs will be skipped' }}"

- name: Check App Store signin status
  command: "{{ mas_bin.stdout }} account"
  register: mas_account
  ignore_errors: true
  changed_when: false
  when: mas_bin.rc == 0

- name: "[LOG] mas — App Store account status"
  debug:
    msg: "App Store: {{ 'signed in as ' + mas_account.stdout | trim if (mas_bin.rc == 0 and mas_account.rc == 0) else 'NOT SIGNED IN — App Store installs will be skipped' }}"
  when: mas_bin.rc == 0

- name: Install App Store apps
  become: true
  command: "{{ mas_bin.stdout }} install {{ item.id }}"
  loop: "{{ mas_apps }}"
  when: mas_bin.rc == 0 and mas_account.rc == 0
  register: mas_result
  changed_when: >
    'already installed' not in (mas_result.stdout | default('')) and
    'already installed' not in (mas_result.stderr | default(''))
  ignore_errors: true