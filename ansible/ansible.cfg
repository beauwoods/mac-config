[defaults]
# Suppress the "discovered Python interpreter" warning on macOS
interpreter_python = auto_silent

# Cleaner output
nocows = 1

# Don't create .retry files
retry_files_enabled = False

# Static fallback log path. When run via bootstrap.sh or run-playbook.sh,
# the ANSIBLE_LOG_PATH env var overrides this automatically — Ansible checks
# that env var natively before using this value.
log_path = /tmp/ansible-dotfiles.log