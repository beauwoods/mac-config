[defaults]
# Suppress the "discovered Python interpreter" warning on macOS
interpreter_python = auto_silent

# Cleaner output
nocows = 1

# Don't create .retry files
retry_files_enabled = False

# Write full run output to a timestamped log file automatically.
# The path uses an env var set by bootstrap.sh and the manual run wrapper.
# Falls back to /tmp if not set.
log_path = {{ lookup('env', 'ANSIBLE_LOG_PATH') or '/tmp/ansible-dotfiles.log' }}